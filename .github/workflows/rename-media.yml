name: Auto-rename uploaded media


on:
  push:
    paths:
      - '_australia/**'
      - 'assets/uploads/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename-media:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fix and rename images
        run: |
          python3 << 'EOF'
          import os, re, shutil, glob

          UPLOADS = 'assets/uploads'
          os.makedirs(UPLOADS, exist_ok=True)

          # Step 1: Move ALL misplaced files anywhere under _australia/ into assets/uploads/
          for root, dirs, files in os.walk('_australia'):
              for fn in files:
                  if fn.endswith(('.png','.jpg','.jpeg','.gif','.webp','.avif','.jfif')):
                      src = os.path.join(root, fn)
                      dst = os.path.join(UPLOADS, fn)
                      if not os.path.exists(dst):
                          shutil.move(src, dst)
                          print(f"Moved: {src} -> {dst}")
                      else:
                          os.remove(src)
                          print(f"Removed duplicate: {src}")
              # Remove empty subdirectories inside _australia/assets/
              for d in dirs:
                  dpath = os.path.join(root, d)
                  if 'assets' in dpath:
                      try:
                          os.rmdir(dpath)
                      except:
                          pass

          # Step 2: Build a filename lookup map (filename -> full path in assets/uploads/)
          upload_files = {}
          for fn in os.listdir(UPLOADS):
              upload_files[fn] = os.path.join(UPLOADS, fn)

          # Step 3: Process each .md file
          rename_map = {}  # original filename -> new_url
          for md_path in sorted(glob.glob('_australia/*.md')):
              with open(md_path, 'r', encoding='utf-8') as f:
                  content = f.read()

              slug = os.path.splitext(os.path.basename(md_path))[0]
              changed = False
              counters = {}

              def get_next_num(slug, ext):
                  key = (slug, ext)
                  if key not in counters:
                      nums = []
                      for fn in os.listdir(UPLOADS):
                          m = re.match(rf'^{re.escape(slug)}-(\d+){re.escape(ext)}$', fn)
                          if m:
                              nums.append(int(m.group(1)))
                      counters[key] = max(nums) + 1 if nums else 1
                  n = counters[key]
                  while os.path.exists(os.path.join(UPLOADS, f"{slug}-{n}{ext}")):
                      n += 1
                  counters[key] = n + 1
                  return n

              # Find all image field values (any path containing assets/uploads)
              lines = content.split('\n')
              new_lines = []
              for line in lines:
                  m = re.match(r'^(\s*\w+\s*:\s*)(.+)$', line)
                  if m and 'assets/uploads' in m.group(2):
                      prefix = m.group(1)
                      raw_val = m.group(2).strip().strip("'\"")

                      # Extract just the filename from whatever path was given
                      filename = os.path.basename(raw_val)
                      ext = os.path.splitext(filename)[1].lower()

                      if not ext:
                          new_lines.append(line)
                          continue

                      # Check if already correctly named
                      if re.match(rf'^{re.escape(slug)}-\d+{re.escape(ext)}$', filename):
                          # Just fix the path format (ensure leading / and correct dir)
                          correct_url = f'/assets/uploads/{filename}'
                          new_line = f"{prefix}{correct_url}"
                          if new_line != line:
                              new_lines.append(new_line)
                              changed = True
                          else:
                              new_lines.append(line)
                          continue

                      # File exists in uploads with original name?
                      if filename in upload_files:
                          num = get_next_num(slug, ext)
                          new_filename = f"{slug}-{num}{ext}"
                          old_path = upload_files[filename]
                          new_path = os.path.join(UPLOADS, new_filename)
                          shutil.move(old_path, new_path)
                          upload_files[new_filename] = new_path
                          del upload_files[filename]
                          rename_map[filename] = new_url
                          print(f"Renamed: {old_path} -> {new_path}")
                          new_url = f'/assets/uploads/{new_filename}'
                          new_lines.append(f"{prefix}{new_url}")
                          changed = True
                          elif filename in rename_map:
    # این فایل قبلاً rename شده، فقط path رو آپدیت کن
    new_lines.append(f"{prefix}{rename_map[filename]}")
    changed = True
                      else:
                          new_lines.append(line)
                  else:
                      new_lines.append(line)

              if changed:
                  with open(md_path, 'w', encoding='utf-8') as f:
                      f.write('\n'.join(new_lines))
                  print(f"Updated: {md_path}")

          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-rename media files [skip ci]"
          git push
