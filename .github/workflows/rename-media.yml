name: Auto-rename uploaded media

on:
  push:
    paths:
      - '_australia/**'
      - 'assets/uploads/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename-media:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fix and rename images
        run: |
          python3 << 'PYEOF'
          import os, re, shutil, glob

          UPLOADS = 'assets/uploads'
          os.makedirs(UPLOADS, exist_ok=True)

          # Move any image files accidentally placed inside _australia/
          for root, dirs, files in os.walk('_australia'):
              for fn in files:
                  if fn.lower().endswith(('.png','.jpg','.jpeg','.gif','.webp','.avif','.jfif')):
                      src = os.path.join(root, fn)
                      dst = os.path.join(UPLOADS, fn)
                      if not os.path.exists(dst):
                          shutil.move(src, dst)
                          print(f"Moved: {src} -> {dst}")
                      else:
                          os.remove(src)
                          print(f"Removed duplicate: {src}")

          # Build lookup of all files currently in uploads
          upload_files = {fn: os.path.join(UPLOADS, fn) for fn in os.listdir(UPLOADS)}

          # Process each .md file
          for md_path in sorted(glob.glob('_australia/*.md')):
              with open(md_path, 'r', encoding='utf-8') as f:
                  lines = f.readlines()

              slug = os.path.splitext(os.path.basename(md_path))[0]
              counters = {}
              rename_map = {}
              new_lines = []
              changed = False

              def next_num(slug, ext):
                  key = (slug, ext)
                  if key not in counters:
                      nums = [int(m.group(1)) for fn in os.listdir(UPLOADS)
                              for m in [re.match(rf'^{re.escape(slug)}-(\d+){re.escape(ext)}$', fn)] if m]
                      counters[key] = max(nums) + 1 if nums else 1
                  n = counters[key]
                  while os.path.exists(os.path.join(UPLOADS, f"{slug}-{n}{ext}")):
                      n += 1
                  counters[key] = n + 1
                  return n

              for line in lines:
                  stripped = line.rstrip('\n')
                  m = re.match(r'^(\s*[\w_]+\s*:\s*)(.+)$', stripped)
                  if not (m and 'assets/uploads' in m.group(2)):
                      new_lines.append(line)
                      continue

                  prefix = m.group(1)
                  raw_val = m.group(2).strip().strip("'\"").strip()
                  filename = os.path.basename(raw_val)
                  ext = os.path.splitext(filename)[1].lower()

                  if not ext:
                      new_lines.append(line)
                      continue

                  # Already correctly named
                  if re.match(rf'^{re.escape(slug)}-\d+{re.escape(ext)}$', filename):
                      correct = f"{prefix}/assets/uploads/{filename}\n"
                      new_lines.append(correct)
                      if correct.rstrip('\n') != stripped:
                          changed = True
                      continue

                  # Already renamed earlier in this run (duplicate ref)
                  if filename in rename_map:
                      new_lines.append(f"{prefix}{rename_map[filename]}\n")
                      changed = True
                      continue

                  # Rename the file
                  if filename in upload_files:
                      n = next_num(slug, ext)
                      new_fn = f"{slug}-{n}{ext}"
                      new_path = os.path.join(UPLOADS, new_fn)
                      shutil.move(upload_files[filename], new_path)
                      upload_files[new_fn] = new_path
                      del upload_files[filename]
                      new_url = f'/assets/uploads/{new_fn}'
                      rename_map[filename] = new_url
                      print(f"Renamed: {filename} -> {new_fn}")
                      new_lines.append(f"{prefix}{new_url}\n")
                      changed = True
                      continue

                  new_lines.append(line)

              if changed:
                  with open(md_path, 'w', encoding='utf-8') as f:
                      f.writelines(new_lines)
                  print(f"Updated: {md_path}")

          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-rename media files [skip ci]"
          git push
