media:
  input: assets/uploads
  output: /assets/uploads

content:
  - name: australia
    label: Australia
    type: collection
    path: _australia
    filename: "{fields.slug}.md"
    view:
      fields: [featured_image, name_fa, city, role]
    fields:
      - name: layout
        label: Layout
        type: string
        default: "person"
        hidden: true
      - name: published
        label: Published true or false
        type: string
        default: "true"
      - name: name_fa
        label: Name FA
        type: string
        required: true
      - name: name_en
        label: Name EN
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
      - name: city
        label: City
        type: string
        required: false
      - name: role
        label: Role
        type: string
        required: false
      - name: email
        label: Email
        type: string
        required: false
      - name: phone
        label: Phone
        type: string
        required: false
      - name: website
        label: Website
        type: string
        required: false
      - name: instagram
        label: Instagram
        type: string
        required: false
      - name: facebook
        label: Facebook
        type: string
        required: false
      - name: telegram
        label: Telegram
        type: string
        required: false
      - name: tags_text
        label: Tags
        type: string
        required: false
      - name: featured_image
        label: Featured Image
        type: image
        required: false
      - name: body
        label: Body
        type: rich-text

  - name: pages
    label: Pages
    type: file
    files:
      - name: about
        label: About
        path: about.md
        fields:
          - name: title
            label: Title
            type: string
          - name: body
            label: Body
            type: rich-text
      - name: contact
        label: Contact
        path: contact.md
        fields:
          - name: title
            label: Title
            type: string
          - name: body
            label: Body
            type: rich-text