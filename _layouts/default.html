<!doctype html>
<html lang="fa" dir="rtl" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --text: #222;
      --muted: #666;
      --border: #e5e5e5;
      --primary: #0f766e;
      --primary-2: #115e59;
      --card: #fbfbfb;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --surface: #1b1b1b;
      --text: #f3f3f3;
      --muted: #b5b5b5;
      --border: #303030;
      --primary: #2dd4bf;
      --primary-2: #14b8a6;
      --card: #181818;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: "Vazirmatn", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.9;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img, video {
      max-width: 100%;
      display: block;
      border-radius: 16px;
    }

    .container {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      border-bottom: 1px solid var(--border);
    }

    .site-header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
    }

    .brand {
      font-weight: 800;
      font-size: 1.05rem;
    }

    .nav {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav a {
      color: var(--muted);
      font-weight: 500;
    }

    .nav a:hover {
      color: var(--text);
    }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 44px;
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
    }

    main {
      padding: 28px 0 48px;
    }

    .site-footer {
      border-top: 1px solid var(--border);
      margin-top: 48px;
      padding: 24px 0 40px;
      color: var(--muted);
      font-size: .95rem;
    }

    @media (max-width: 700px) {
      .site-header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container site-header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">مزیاب | MozYab - مزدوریاب در استرالیا</a>

      <nav class="nav">
        <a href="{{ '/' | relative_url }}">خانه</a>
        <a href="{{ '/about/' | relative_url }}">درباره ما</a>
        <a href="{{ '/contact/' | relative_url }}">ارتباط با ما</a>

        <button class="theme-toggle" id="themeToggle" type="button" aria-label="تغییر تم">
          <span id="themeIcon" aria-hidden="true"></span>
        </button>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      © {{ site.time | date: "%Y" }} - {{ site.title }}
    </div>
  </footer>

  <script>
    (function () {
      const root = document.documentElement;
      const btn = document.getElementById("themeToggle");
      const icon = document.getElementById("themeIcon");

      function sunIcon() {
        return `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
          </svg>
        `;
      }

      function moonIcon() {
        return `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        `;
      }

      let theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";

      function applyTheme(mode) {
        root.setAttribute("data-theme", mode);
        icon.innerHTML = mode === "dark" ? sunIcon() : moonIcon();
      }

      applyTheme(theme);

      if (btn) {
        btn.addEventListener("click", function () {
          theme = theme === "dark" ? "light" : "dark";
          applyTheme(theme);
        });
      }
    })();
  </script>
</body>
</html>
