<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --text: #222;
      --muted: #666;
      --border: #e5e5e5;
      --primary: #0f766e;
      --primary-2: #115e59;
      --card: #fbfbfb;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --surface: #1b1b1b;
      --text: #f3f3f3;
      --muted: #b5b5b5;
      --border: #303030;
      --primary: #2dd4bf;
      --primary-2: #14b8a6;
      --card: #181818;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Vazirmatn", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.9;
    }

    a { color: inherit; text-decoration: none; }
    img, video { max-width: 100%; display: block; border-radius: 16px; }
    .container { width: min(1100px, calc(100% - 32px)); margin: 0 auto; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      border-bottom: 1px solid var(--border);
    }

    .site-header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
    }

    .brand {
      font-weight: 800;
      font-size: 1.05rem;
    }

    .nav {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav a {
      color: var(--muted);
      font-weight: 500;
    }

    .nav a:hover { color: var(--text); }

    .theme-toggle {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-family: inherit;
    }

    main { padding: 28px 0 48px; }

    .site-footer {
      border-top: 1px solid var(--border);
      margin-top: 48px;
      padding: 24px 0 40px;
      color: var(--muted);
      font-size: .95rem;
    }

    @media (max-width: 700px) {
      .site-header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container site-header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">استرالیا دایرکتوری</a>

      <nav class="nav">
        <a href="{{ '/' | relative_url }}">خانه</a>
        <a href="{{ '/about/' | relative_url }}">درباره ما</a>
        <a href="{{ '/contact/' | relative_url }}">ارتباط با ما</a>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="تغییر تم"><span id="themeIcon" aria-hidden="true"></span>
</button>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      © {{ site.time | date: "%Y" }} - {{ site.title }}
    </div>
  </footer>

  <script>
    (function () {
      const root = document.documentElement;
      const btn = document.getElementById("themeToggle");
      let theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      root.setAttribute("data-theme", theme);

      btn.addEventListener("click", function () {
        theme = theme === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", theme);
      });
    })();
  </script>
</body>
</html>
